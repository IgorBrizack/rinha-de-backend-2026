services:
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    networks:
      - rinha-network

  api1:
    container_name: rinha-api1
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - go-build-cache:/root/.cache/go-build
      - go-pkg-cache:/go/pkg/mod
    environment:
      - PORT=8080
    ports:
      - "2345:2345"
    networks:
      - rinha-network

  api2:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - go-build-cache:/root/.cache/go-build
      - go-pkg-cache:/go/pkg/mod
    environment:
      - PORT=8080
    networks:
      - rinha-network

volumes:
  go-build-cache:
  go-pkg-cache:

networks:
  rinha-network:
    driver: bridge
