services:
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets:/run/sockets
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    networks:
      - rinha-network
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "10MB"

  api1:
    image: ghcr.io/igorbrizack/rinha-de-backend-2026:latest
    pull_policy: always
    environment:
      - SOCKET_PATH=/run/sockets/api1.sock
    volumes:
      - sockets:/run/sockets
    networks:
      - rinha-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "--unix-socket", "/run/sockets/api1.sock", "http://localhost/ready"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "170MB"

  api2:
    image: ghcr.io/igorbrizack/rinha-de-backend-2026:latest
    pull_policy: always
    environment:
      - SOCKET_PATH=/run/sockets/api2.sock
    volumes:
      - sockets:/run/sockets
    networks:
      - rinha-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "--unix-socket", "/run/sockets/api2.sock", "http://localhost/ready"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "170MB"

volumes:
  sockets:

networks:
  rinha-network:
    driver: bridge
